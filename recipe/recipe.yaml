schema_version: 1

context:
  name: urllib3-future
  version: "2.20.905"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/urllib3_future-${{ version }}.tar.gz
  sha256: e7cde1cdf3657f0c80505212bebe952f1344a3dad656e91738acef60e01fae15

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.6.0,<2
    - pip
  run:
    - python >=${{ python_min }}
    - qh3 >=1.5.4,<2.0.0
    - h11 >=0.11.0,<1.0.0
    - jh2 >=5.0.3,<6.0.0

tests:
  - python:
      imports:
        - urllib3_future
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: urllib3.future is a powerful HTTP 1.1, 2, and 3 client with both sync and async interfaces
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/jawah/urllib3.future

extra:
  recipe-maintainers:
    - rxm7706
    - jan-janssen
